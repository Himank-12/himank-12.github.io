<!DOCTYPE html>
<html>
<head>
  <title>Himank ⚡</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: black;
      padding-top: 40px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-top: 20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00ffcc; }
      to { box-shadow: 0 0 30px #00ffcc; }
    }

    h1 {
      margin: 10px;
    }

    .typing {
      font-size: 18px;
      color: #00ffcc;
      height: 20px;
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 260px;
      border-radius: 30px;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      background: #00ffcc;
      color: black;
      transform: scale(1.1);
      box-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>

<body>

<img src="https://i.ibb.co/KjwG57dt/Skull-logo.jpg">

<h1>Himank ⚡</h1>
<div class="typing" id="typing"></div>

<a href="https://instagram.com">Instagram</a>
<a href="https://youtube.com">YouTube</a>
<a href="https://linktr.ee/himank12">All Links</a>

<script>
const text = ["a Cool-minded teenager 😜 | E.I.S 109 | Just a JAAT living life!"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  current = text[i];
  document.getElementById("typing").innerHTML = current.substring(0, j);

  if (!isDeleting && j < current.length) j++;
  else if (isDeleting && j > 0) j--;
  else {
    isDeleting = !isDeleting;
    if (!isDeleting) i = (i + 1) % text.length;
  }

  setTimeout(type, isDeleting ? 50 : 100);
}
type();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Himank 🚀</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(-45deg, #000, #0f2027, #203a43, #000);
      background-size: 400% 400%;
      animation: bg 10s infinite;
      padding-top: 50px;
    }

    @keyframes bg {
      0% {background-position: 0%}
      50% {background-position: 100%}
      100% {background-position: 0%}
    }

    img {
      width: 120px;
      border-radius: 50%;
      box-shadow: 0 0 25px #00ffcc;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {box-shadow: 0 0 10px #00ffcc;}
      to {box-shadow: 0 0 30px #00ffcc;}
    }

    h1 {
      margin-top: 10px;
      font-size: 28px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 260px;
      background: rgba(0,255,204,0.1);
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #00ffcc;
      color: black;
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>

<body>

<img src="https://i.ibb.co/KjwG57dt/Skull-logo.jpg">

<h1>Himank 🚀</h1>
<p>Student | Tech Lover | Dream Big 💯</p>

<a href="https://instagram.com">Instagram</a>
<a href="https://youtube.com">YouTube</a>
<a href="https://linktr.ee/himank12">All Links</a>

</body>
</html>
